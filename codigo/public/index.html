<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal TI</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script src="./assets/js/login.js"></script>
    <script src="./assets/js/favoritos.js"></script>
    <style>
      .artigos-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        margin-top: 20px;
      }
      .card-artigo {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 16px;
        position: relative;
        background: #fff;
        transition: border-color 0.2s;
      }
      .card-artigo.favoritado-card {
        border-color: #f5a623;
        box-shadow: 0 0 0 2px #f5a62340;
      }
      .card-artigo .categoria {
        font-size: 0.75em;
        background: #093070;
        color: #fff;
        padding: 2px 8px;
        border-radius: 12px;
        display: inline-block;
        margin-bottom: 8px;
      }
      .card-artigo h4 { margin: 0 0 8px; color: #093070; font-size: 1em; }
      .card-artigo p  { font-size: 0.9em; color: #555; margin: 0; }
      .btn-favorito {
        position: absolute;
        top: 10px;
        right: 10px;
        background: none;
        border: none;
        font-size: 1.5em;
        cursor: pointer;
        color: #ccc;
        transition: color 0.2s;
        line-height: 1;
      }
      .btn-favorito.favoritado { color: #f5a623; }
      .btn-favorito:hover { color: #f5a623; }
    </style>
  </head>
  <body>
    <header>
      <div class="banner">
        <img src="./assets/images/banner_ti.png" alt="Banner TI" />
      </div>
      <div class="barra-info">
        <nav class="menu">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Sobre nós</a></li>
            <li><a href="modulos/favoritos.html">⭐ Meus Favoritos</a></li>
          </ul>
        </nav>
        <div class="dados-usuario">
          <span id="userInfo"></span>
        </div>
      </div>
    </header>

    <main>
      <h3>Artigos de Tecnologia</h3>
      <p>Clique na estrela ⭐ para salvar um artigo nos seus favoritos.</p>
      <div class="artigos-grid" id="artigos-grid"></div>
    </main>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        fetch('/artigos')
          .then(r => r.json())
          .then(artigos => {
            let grid = document.getElementById('artigos-grid');
            grid.innerHTML = artigos.map(a => `
              <div class="card-artigo" id="card-${a.id}">
                <button class="btn-favorito" data-id="${a.id}" title="Adicionar aos favoritos"
                  onclick="handleFavorito(${a.id}, this)">★</button>
                <span class="categoria">${a.categoria}</span>
                <h4>${a.titulo}</h4>
                <p>${a.descricao}</p>
              </div>
            `).join('');
            marcarBotoesFavoritos();
            // Marca borda dos cards já favoritados
            document.querySelectorAll('.btn-favorito.favoritado').forEach(btn => {
              btn.closest('.card-artigo').classList.add('favoritado-card');
            });
          });
      });

      function handleFavorito(artigoId, btnEl) {
        toggleFavorito(artigoId, btnEl);
        // Atualiza borda do card
        let card = document.getElementById('card-' + artigoId);
        if (card) {
          card.classList.toggle('favoritado-card', btnEl.classList.contains('favoritado'));
        }
      }
    </script>
  </body>
</html>
